<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.longname }} · {{ site.description }}{% endif %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="apple-touch-icon" href="img/logo.png">

    <meta property="og:title" content="{{ site.longname }}" />
    <meta property="og:url" content="{{ site.website }}" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="{{ site.description }}" />
    <meta property="og:image" content="{{ site.website }}/{{ site.image_path }}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@{{ site.twitter }}" />
    <meta name="twitter:image" content="{{ site.website }}/{{ site.image_path }}" />
    <meta name="cloudflare-recovery" content="For recovery of cloudflare account">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/site.css">
</head>
